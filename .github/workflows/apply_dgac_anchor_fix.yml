name: apply-dgac-anchor-fix

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply_dgac_anchor_fix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-dgac-anchor-fix
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply patch and validate
        run: |
          python - <<'PY'
          from pathlib import Path

          py_path = Path('jamba_coconut_finetune.py')
          bp_path = Path('BLUEPRINT.md')
          workflow_path = Path('.github/workflows/apply_dgac_anchor_fix.yml')

          text = py_path.read_text(encoding='utf-8')

          cli_anchor = '    parser.add_argument("--use_halt_gate", action="store_true")\n'
          cli_insert = '''    parser.add_argument(
              "--resume_from_diloco_anchor",
              action="store_true",
              help=(
                  "Load DiLoCo anchor weights from diloco_state/anchor/ on Hub as the "
                  "base model for DGAC (--use_halt_gate) training. "
                  "Requires --use_halt_gate, --hf_token, and --diloco_state_repo. "
                  "Bypasses find_latest_resume_checkpoint(); halt_gate starts from zero-init. "
                  "Use instead of --resume_from when curriculum was trained via DiLoCo mode."
              ),
          )
          '''
          if '--resume_from_diloco_anchor' not in text:
              if cli_anchor not in text:
                  raise SystemExit('CLI insertion anchor not found')
              text = text.replace(cli_anchor, cli_anchor + cli_insert, 1)

          resume_anchor = '        requested_resume_path: Optional[Path] = Path(args.resume_from) if args.resume_from else None\n'
          anchor_block = '''        # ── DiLoCo anchor load for DGAC ──────────────────────────────────────────────
          # When --use_halt_gate + --resume_from_diloco_anchor are set together, load the
          # DiLoCo stage-10 aggregate from Hub as the base LoRA weights, then run
          # training directly and return. The outer try/finally handles all cleanup
          # (destroy_process_group, wandb.finish). Do NOT call them here.
          if getattr(args, "resume_from_diloco_anchor", False):
              if not args.use_halt_gate:
                  raise ValueError(
                      "--resume_from_diloco_anchor requires --use_halt_gate. "
                      "This flag is only valid for Phase 3.4 DGAC training."
                  )
              if not hf_token:
                  raise ValueError(
                      "--resume_from_diloco_anchor requires an HF token. "
                      "Provide --hf_token, set HF_TOKEN, or define a Kaggle secret."
                  )
              anchor_repo = getattr(args, "diloco_state_repo", "WeirdRunner/Ouroboros")
              if is_main:
                  print(
                      f"\n  [DGAC] Loading DiLoCo anchor from {anchor_repo}/diloco_state/anchor "
                      "as base weights for Phase 3.4 DGAC training."
                  )
              diloco_download_anchor(
                  model,
                  hf_token,
                  anchor_repo,
                  "diloco_state/anchor",
                  device,
              )
              if is_main:
                  print(
                      "  [DGAC] Anchor loaded. HaltGate at zero-init. "
                      "gate_stage will default to curriculum_max_stage. Optimizer starts fresh."
                  )
              if distributed:
                  broadcast_parameters(get_trainable_parameters(model, halt_gate), src=0)
                  barrier()
              run_training_stages(
                  model=model,
                  tokenizer=tokenizer,
                  halt_gate=halt_gate,
                  train_samples=train_samples,
                  val_samples=val_samples,
                  lat_token_id=lat_token_id,
                  pad_id=pad_id,
                  args=args,
                  device=device,
                  output_dir=output_dir,
                  session_start=session_start,
                  wandb_run=wandb_run,
                  stages=[curriculum_max_stage],
                  curriculum_max_stage=curriculum_max_stage,
                  resume_path=None,
                  resume_same_stage=False,
                  resume_stage=curriculum_max_stage,
                  resume_epoch=0,
                  resume_step_in_epoch=-1,
                  global_step=0,
                  step_in_phase=0,
                  load_best_between_stages=False,
                  run_generation_at_stage_end=bool(args.gen_every_stage),
                  run_epoch_end_val=True,
              )
              return  # finally in main() handles destroy_process_group and wandb.finish
          # ─────────────────────────────────────────────────────────────────────────────
          '''
          if '[DGAC] Loading DiLoCo anchor' not in text:
              if resume_anchor not in text:
                  raise SystemExit('Resume-path insertion anchor not found')
              text = text.replace(resume_anchor, anchor_block + resume_anchor, 1)

          py_path.write_text(text, encoding='utf-8')

          bp = bp_path.read_text(encoding='utf-8')
          step3_start = bp.index('### Step 3 — DGAC prep:')
          step4_start = bp.index('### Step 4 — Stage 3 rounds 2–3:')
          step3_replacement = '''### Step 3 — DGAC prep: anchor handoff fixed ✅
✅ `--use_halt_gate` can now start from DiLoCo-trained stage-10 LoRA weights.
The `--resume_from_diloco_anchor` flag loads `diloco_state/anchor/` from Hub before DGAC training, bypassing the checkpoint-file resume path.

**DGAC launch command:**
```bash
torchrun --standalone --nproc_per_node=2 jamba_coconut_finetune.py \\
  --use_halt_gate \\
  --resume_from_diloco_anchor \\
  --diloco_state_repo WeirdRunner/Ouroboros \\
  --hf_token "$HF_TOKEN" \\
  --data_dir data/coconut_v1 --use_4bit \\
  --epochs_per_stage 3 \\
  --max_stage 10 \\
  --max_grad_norm 0.3 \\
  --batch_size 4 --grad_accum 8 \\
  --val_batch_size 2 \\
  --val_skip_buffer_minutes 60 \\
  --session_timeout_hours 12.0 --graceful_exit_buffer_minutes 20 \\
  --push_to_hub \\
  --output_dir runs/stage3_dgac \\
  --wandb_project "ouroboros-stage3-jamba"
```

'''
          bp = bp[:step3_start] + step3_replacement + bp[step4_start:]

          bp = bp.replace(
              '| **DGAC base weights** | Loaded from `diloco_state/anchor/` via `--resume_from_diloco_anchor` (fix pending). |',
              '| **DGAC base weights** | Loaded from `diloco_state/anchor/` via `--resume_from_diloco_anchor` ✅ |',
          )
          if '| **DGAC base weights** | Loaded from `diloco_state/anchor/` via `--resume_from_diloco_anchor` ✅ |' not in bp:
              marker = '| **Stages 4–7 structure** | 1 round each (3 workers × 12,302 samples = 36,906 = full stage). Stage complete after round 0. |\n'
              if marker not in bp:
                  raise SystemExit('Resolved-decisions insertion anchor not found')
              bp = bp.replace(marker, marker + '| **DGAC base weights** | Loaded from `diloco_state/anchor/` via `--resume_from_diloco_anchor` ✅ |\n', 1)

          bp = bp.replace(
              '| **DGAC base weights: `--use_halt_gate` cannot find DiLoCo anchor** | **Fix pending: `--resume_from_diloco_anchor` flag. See `prompts/fix_dgac_anchor_handoff.md`** |',
              '| **DGAC base weights: `--use_halt_gate` cannot find DiLoCo anchor** | **Fixed: `--resume_from_diloco_anchor` loads `diloco_state/anchor/` from Hub. ✅** |',
          )
          bp = bp.replace(
              '| `jamba_coconut_finetune.py` | ✅ All patches deployed; `--resume_from_diloco_anchor` fix pending |',
              '| `jamba_coconut_finetune.py` | ✅ All patches deployed; `--resume_from_diloco_anchor` implemented |',
          )
          bp = bp.replace(
              '| **`--use_halt_gate` starts from random LoRA weights (DiLoCo path)** | **`--resume_from_diloco_anchor` loads `diloco_state/anchor/` before DGAC training (fix pending)** |',
              '| **`--use_halt_gate` starts from random LoRA weights (DiLoCo path)** | **`--resume_from_diloco_anchor` loads `diloco_state/anchor/` before DGAC training. ✅ Fixed** |',
          )
          bp_path.write_text(bp, encoding='utf-8')

          workflow_path.unlink(missing_ok=True)

          py_after = py_path.read_text(encoding='utf-8')
          checks = [
              '--resume_from_diloco_anchor',
              '[DGAC] Loading DiLoCo anchor',
              'diloco_download_anchor(',
              'resume_path=None',
              'return  # finally in main() handles destroy_process_group and wandb.finish',
          ]
          missing = [item for item in checks if item not in py_after]
          if missing:
              raise SystemExit(f'Missing expected Python markers: {missing}')

          bp_after = bp_path.read_text(encoding='utf-8')
          doc_checks = [
              'torchrun --standalone --nproc_per_node=2 jamba_coconut_finetune.py',
              '| **DGAC base weights** | Loaded from `diloco_state/anchor/` via `--resume_from_diloco_anchor` ✅ |',
              'Fixed: `--resume_from_diloco_anchor` loads `diloco_state/anchor/` from Hub. ✅',
          ]
          missing_docs = [item for item in doc_checks if item not in bp_after]
          if missing_docs:
              raise SystemExit(f'Missing expected Blueprint markers: {missing_docs}')
          PY

          python -m py_compile jamba_coconut_finetune.py
          git diff -- jamba_coconut_finetune.py BLUEPRINT.md .github/workflows/apply_dgac_anchor_fix.yml

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jamba_coconut_finetune.py BLUEPRINT.md .github/workflows/apply_dgac_anchor_fix.yml
          git commit -m "fix: load DiLoCo anchor for DGAC"
          git push
