name: DiLoCo Coordinator

on:
  push:
    paths:
      - 'signals/worker_*.json'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

concurrency:
  group: diloco-coordinator
  cancel-in-progress: false

jobs:
  coordinate:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # bumped from 15: anchor upload is ~1.5GB, needs headroom

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch: ~200MB vs ~2.5GB for CUDA build — coordinator never uses GPU
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy huggingface_hub safetensors requests wandb kaggle

      - name: Run coordinator
        env:
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          WANDB_KEY:         ${{ secrets.WANDB_KEY }}
          KAGGLE_USERNAME_A: ${{ secrets.KAGGLE_USERNAME_A }}
          KAGGLE_KEY_A:      ${{ secrets.KAGGLE_KEY_A }}
          KAGGLE_USERNAME_B: ${{ secrets.KAGGLE_USERNAME_B }}
          KAGGLE_KEY_B:      ${{ secrets.KAGGLE_KEY_B }}
          KAGGLE_USERNAME_C: ${{ secrets.KAGGLE_USERNAME_C }}
          KAGGLE_KEY_C:      ${{ secrets.KAGGLE_KEY_C }}
        run: |
          python diloco_coordinator.py \
            --hf_token          "$HF_TOKEN" \
            --repo_id           "WeirdRunner/Ouroboros" \
            --min_workers       2 \
            --outer_lr          0.7 \
            --wandb_key         "$WANDB_KEY" \
            --wandb_project     "ouroboros-stage3-jamba" \
            --kaggle_username_a "$KAGGLE_USERNAME_A" \
            --kaggle_key_a      "$KAGGLE_KEY_A" \
            --kaggle_username_b "$KAGGLE_USERNAME_B" \
            --kaggle_key_b      "$KAGGLE_KEY_B" \
            --kaggle_username_c "$KAGGLE_USERNAME_C" \
            --kaggle_key_c      "$KAGGLE_KEY_C" \
            --total_train_samples 36906
