name: 🗂 Generate router.json

# Runs on every push to main (or manually via the Actions tab)
on:
  push:
    branches: [main, master]
    # Only re-run when actual repo content changes, not when router.json itself changes
    paths-ignore:
      - "router.json"
  workflow_dispatch:          # allows manual trigger from the Actions tab

permissions:
  contents: write             # needed to git-push router.json back

jobs:
  generate-router:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so generate_router.py can inspect git metadata
          fetch-depth: 0

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Run the generator ───────────────────────────────────────────────
      - name: Generate router.json
        run: python generate_router.py
        # Override owner/repo if auto-detection ever fails:
        # run: python generate_router.py --owner ${{ github.repository_owner }} --repo ${{ github.event.repository.name }}

      # ── 4. Commit & push router.json ───────────────────────────────────────
      - name: Commit router.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if router.json actually changed
          if git diff --quiet router.json 2>/dev/null && git ls-files --error-unmatch router.json 2>/dev/null; then
            echo "router.json unchanged — nothing to commit."
          else
            git add router.json
            git commit -m "chore: regenerate router.json [skip ci]"
            git push
          fi
