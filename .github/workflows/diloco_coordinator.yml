name: coordinate

on:
  push:
    branches:
      - main
    paths:
      - 'signals/*.json'
  workflow_dispatch:
    inputs:
      force_worker_ids:
        description: 'Force-trigger specific workers, e.g. "A,B". Empty = auto-detect from shard sizes.'
        required: false
        default: ''
      skip_trigger:
        description: 'Aggregate previous round only. Do not trigger next workers.'
        required: false
        default: 'false'
      dry_run:
        description: 'Print round plan without aggregating or triggering.'
        required: false
        default: 'false'
      workflow_validate:
        description: 'Optional read-only workflow validation mode. Supported: "" or "cpu-smoke". Defaults to Worker A when force_worker_ids is empty.'
        required: false
        default: ''
      kaggle_run_mode:
        description: 'Kaggle launch mode. Use benchmark for lm-evaluation-harness progress checks.'
        required: false
        type: choice
        default: 'dgac-diloco'
        options:
          - diloco
          - dgac-anchor-eval
          - dgac-canary
          - dgac-train
          - dgac-diloco
          - benchmark
      benchmark_tasks:
        description: 'Only applies when kaggle_run_mode=benchmark. lm-eval tasks, comma-separated.'
        required: false
        default: 'arc_easy,hellaswag,winogrande'
      benchmark_limit:
        description: 'Only applies when kaggle_run_mode=benchmark. Sample limit per task. Empty/full/none/0 = full benchmark; use 100 for a smoke run.'
        required: false
        default: ''
      benchmark_output_dir:
        description: 'Only applies when kaggle_run_mode=benchmark. Local output directory before Hub upload.'
        required: false
        default: 'runs/lm_eval_benchmark'
      benchmark_model_args:
        description: 'Optional raw lm-eval --model_args override. Leave empty to load base Jamba plus diloco_state/anchor adapter.'
        required: false
        default: ''
      dgac_anchor_eval_resume_mode:
        description: 'Only applies when kaggle_run_mode=dgac-anchor-eval. Use diagnostics-only to skip already-known base validation/generation and resume DGAC diagnostics.'
        required: false
        type: choice
        default: 'full'
        options:
          - full
          - diagnostics-only
      dgac_diagnostics_forced_kmax_ce:
        description: 'Optional known forced-kmax CE for diagnostics-only anchor eval, e.g. 0.4112 from the prior completed base validation.'
        required: false
        default: ''
      attendance_join_grace_minutes:
        description: 'Waiting-mode attendance barrier grace. Default 5 minutes.'
        required: false
        default: '5'

concurrency:
  group: diloco-coordinate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  coordinate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Static sanity checks
        run: |
          python -m compileall -q .

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch: ~200MB vs ~2.5GB for CUDA build — coordinator never uses GPU
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # kaggle>=1.8.4 required: --accelerator flag for kernels push added in v1.8.4 (#907).
          # The prior 403 (Session 15) was on KernelsApiService/GetKernel (pull endpoint).
          # We use push-only; push endpoint is not blocked. kaggle>=1.8.3 gRPC is fine here.
          pip install numpy "kaggle>=1.8.4" huggingface_hub safetensors requests wandb

      - name: Run coordinator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_KEY: ${{ secrets.WANDB_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KAGGLE_USERNAME_A: ${{ secrets.KAGGLE_USERNAME_A }}
          KAGGLE_KEY_A: ${{ secrets.KAGGLE_KEY_A }}
          KAGGLE_USERNAME_B: ${{ secrets.KAGGLE_USERNAME_B }}
          KAGGLE_KEY_B: ${{ secrets.KAGGLE_KEY_B }}
          KAGGLE_USERNAME_C: ${{ secrets.KAGGLE_USERNAME_C }}
          KAGGLE_KEY_C: ${{ secrets.KAGGLE_KEY_C }}
          OUROBOROS_WORKFLOW_VALIDATE: ${{ github.event.inputs.workflow_validate || '' }}
          OUROBOROS_WORKFLOW_VALIDATION_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          OUROBOROS_KAGGLE_RUN_MODE: ${{ github.event.inputs.kaggle_run_mode || 'diloco' }}
          OUROBOROS_DGAC_DIAGNOSTICS_ONLY: ${{ github.event.inputs.dgac_anchor_eval_resume_mode == 'diagnostics-only' && '1' || '' }}
          OUROBOROS_DGAC_DIAGNOSTICS_FORCED_KMAX_CE: ${{ github.event.inputs.dgac_diagnostics_forced_kmax_ce || '' }}
          OUROBOROS_BENCHMARK_TASKS: ${{ github.event.inputs.benchmark_tasks }}
          OUROBOROS_BENCHMARK_LIMIT: ${{ github.event.inputs.benchmark_limit }}
          OUROBOROS_BENCHMARK_OUTPUT_DIR: ${{ github.event.inputs.benchmark_output_dir }}
          OUROBOROS_BENCHMARK_MODEL_ARGS: ${{ github.event.inputs.benchmark_model_args }}
          OUROBOROS_BENCHMARK_PUBLISH_TO_HUB: '1'
        run: |
          python diloco_coordinator.py \
            --hf_token          "$HF_TOKEN" \
            --repo_id           "WeirdRunner/Ouroboros" \
            --outer_lr          0.7 \
            --worker_timeout_hours 13.0 \
            --attendance_join_grace_minutes "${{ github.event.inputs.attendance_join_grace_minutes || '5' }}" \
            --wandb_key         "$WANDB_KEY" \
            --wandb_project     "ouroboros-stage3-jamba" \
            --kaggle_username_a "$KAGGLE_USERNAME_A" \
            --kaggle_key_a      "$KAGGLE_KEY_A" \
            --kaggle_username_b "$KAGGLE_USERNAME_B" \
            --kaggle_key_b      "$KAGGLE_KEY_B" \
            --kaggle_username_c "$KAGGLE_USERNAME_C" \
            --kaggle_key_c      "$KAGGLE_KEY_C" \
            --total_train_samples 36906 \
            --min_shard_samples  32 \
            --workflow_validate "$OUROBOROS_WORKFLOW_VALIDATE" \
            --workflow_validation_run_id "$OUROBOROS_WORKFLOW_VALIDATION_RUN_ID" \
            --kaggle_run_mode "$OUROBOROS_KAGGLE_RUN_MODE" \
            ${{ github.event.inputs.force_worker_ids && format('--force_worker_ids "{0}"', github.event.inputs.force_worker_ids) || '' }} \
            ${{ github.event.inputs.skip_trigger == 'true' && '--skip_trigger' || '' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry_run' || '' }}
